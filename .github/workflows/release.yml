name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build And Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set Up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Release Artifacts
        run: make build

      - name: Package Release Archives
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          stage_dir="$(mktemp -d)"
          release_dir="${GITHUB_WORKSPACE}/release"
          mkdir -p "${release_dir}"

          for variant in portable local-nvml; do
            package_name="nvimon_${TAG}_linux_amd64_${variant}"
            package_dir="${stage_dir}/${package_name}"

            mkdir -p "${package_dir}"
            cp "dist/${variant}/nvimon" "${package_dir}/"
            cp "dist/${variant}/nvimon-agent" "${package_dir}/"
            cp config.example.yaml "${package_dir}/"
            cp LICENSE "${package_dir}/"
            cp scripts/install-client.sh "${package_dir}/"
            cp scripts/install-agent.sh "${package_dir}/"
            cp packaging/systemd/nvimon-agent.service "${package_dir}/"

            tar -C "${stage_dir}" -czf "${release_dir}/${package_name}.tar.gz" "${package_name}"
          done

          (
            cd "${release_dir}"
            sha256sum ./*.tar.gz > checksums.txt
          )

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/checksums.txt
